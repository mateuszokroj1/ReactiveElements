trigger:
- master

pool:
  vmImage: 'windows-latest'

steps:
    - task: NuGetCommand@2
      inputs:
        command: 'restore'
        restoreSolution: '**/*.sln'
        feedsToUse: 'config'
        nugetConfigPath: 'ReactiveElements/nuget.config'
        noCache: true

    - task: VSBuild@1
      inputs:
        solution: '**\*.sln'
        clean: true
        msbuildArchitecture: 'x64'

    - task: VSTest@2
      inputs:
        testSelector: 'testAssemblies'
        testAssemblyVer2: |
          **\*test*.dll
          !**\*TestAdapter.dll
          !**\obj\**
        searchFolder: '$(System.DefaultWorkingDirectory)'
        runInParallel: true
        codeCoverageEnabled: true
        testRunTitle: 'ReactiveElements test'

    - task: NuGetCommand@2
      inputs:
        command: 'pack'
        packagesToPack: '**/*.csproj'
        versioningScheme: 'off'

    - task: NuGetCommand@2
      inputs:
        command: 'push'
        packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg;!$(Build.ArtifactStagingDirectory)/**/*.symbols.nupkg'
        nuGetFeedType: 'internal'
        publishVstsFeed: '03b67d2f-268f-4928-b709-1cb2aebff12d/5c78c336-08a1-431e-ab84-7bf7b1143317'
        allowPackageConflicts: true